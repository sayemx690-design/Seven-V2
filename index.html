<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>License Manager Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <style>
    :root {
      --bg: #0a0f1a;
      --bg-secondary: #111827;
      --fg: #f1f5f9;
      --muted: #64748b;
      --accent: #06d6a0;
      --accent-dim: #059669;
      --danger: #ef4444;
      --danger-dim: #dc2626;
      --card: rgba(17, 24, 39, 0.95);
      --border: rgba(100, 116, 139, 0.2);
      --purple: #8b5cf6;
      --orange: #f59e0b;
      --cyan: #22d3ee;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    .bg-pattern {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: 
        radial-gradient(ellipse at 20% 30%, rgba(6, 214, 160, 0.06) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 70%, rgba(59, 130, 246, 0.04) 0%, transparent 50%);
      pointer-events: none;
    }

    .main-container {
      position: relative;
      z-index: 10;
      max-width: 1200px;
      margin: 0 auto;
      padding: 12px;
    }

    .header {
      text-align: center;
      margin-bottom: 12px;
    }

    .header h1 {
      font-size: clamp(18px, 5vw, 28px);
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, var(--fg) 0%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 4px;
    }

    .header p {
      color: var(--muted);
      font-size: 12px;
    }

    .top-nav {
      display: flex;
      gap: 4px;
      margin-bottom: 12px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 4px;
    }

    .nav-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 10px 12px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      background: transparent;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .nav-btn:active {
      background: rgba(100, 116, 139, 0.15);
    }

    .nav-btn.active {
      color: var(--bg);
      background: var(--accent);
    }

    .nav-btn svg {
      width: 16px;
      height: 16px;
    }

    .auth-card {
      max-width: 340px;
      margin: 0 auto;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
    }

    .auth-card h2 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .auth-card h2 svg {
      width: 20px;
      height: 20px;
      color: var(--accent);
    }

    .input-group {
      margin-bottom: 12px;
    }

    .input-group label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .input-group input,
    .input-group select {
      width: 100%;
      padding: 10px 12px;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--fg);
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      transition: border-color 0.15s;
    }

    .input-group input::placeholder {
      color: var(--muted);
      opacity: 0.6;
    }

    .input-group input:focus,
    .input-group select:focus {
      outline: none;
      border-color: var(--accent);
    }

    .time-presets {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      margin-top: 8px;
    }

    .preset-btn {
      padding: 8px 6px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 11px;
      font-weight: 600;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    .preset-btn.daily {
      background: rgba(139, 92, 246, 0.12);
      border: 1px solid rgba(139, 92, 246, 0.25);
      color: #a78bfa;
    }

    .preset-btn.daily:active,
    .preset-btn.daily.active {
      background: var(--purple);
      color: white;
      border-color: var(--purple);
    }

    .preset-btn.three-days {
      background: rgba(6, 214, 160, 0.12);
      border: 1px solid rgba(6, 214, 160, 0.25);
      color: var(--accent);
    }

    .preset-btn.three-days:active,
    .preset-btn.three-days.active {
      background: var(--accent);
      color: var(--bg);
      border-color: var(--accent);
    }

    .preset-btn.seven-days {
      background: rgba(245, 158, 11, 0.12);
      border: 1px solid rgba(245, 158, 11, 0.25);
      color: var(--orange);
    }

    .preset-btn.seven-days:active,
    .preset-btn.seven-days.active {
      background: var(--orange);
      color: var(--bg);
      border-color: var(--orange);
    }

    .preset-btn.custom {
      background: rgba(100, 116, 139, 0.12);
      border: 1px solid rgba(100, 116, 139, 0.25);
      color: var(--muted);
    }

    .preset-btn.custom:active,
    .preset-btn.custom.active {
      background: rgba(100, 116, 139, 0.3);
      color: var(--fg);
      border-color: var(--muted);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 10px 16px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 13px;
      font-weight: 600;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .btn:active {
      opacity: 0.85;
    }

    .btn-primary {
      background: var(--accent);
      color: var(--bg);
      width: 100%;
    }

    .btn-secondary {
      background: rgba(100, 116, 139, 0.2);
      color: var(--fg);
      border: 1px solid var(--border);
    }

    .btn-danger {
      background: var(--danger);
      color: white;
    }

    .btn-sm {
      padding: 6px 10px;
      font-size: 11px;
    }

    #panel {
      display: none;
    }

    .panel-active {
      display: block !important;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
      margin-bottom: 12px;
    }

    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 6px;
      text-align: center;
    }

    .stat-card .label {
      font-size: 9px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.03em;
      margin-bottom: 4px;
    }

    .stat-card .value {
      font-size: 18px;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
    }

    .stat-card.accent .value { color: var(--accent); }
    .stat-card.danger .value { color: var(--danger); }
    .stat-card.cyan .value { color: var(--cyan); }

    .form-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 12px;
    }

    .form-card h3 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .form-card h3 svg {
      width: 18px;
      height: 18px;
      color: var(--accent);
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .form-grid .input-group:last-child {
      grid-column: 1 / -1;
    }

    .form-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    .form-actions .btn-primary {
      flex: 1;
    }

    .users-modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      z-index: 100;
      display: none;
      align-items: flex-end;
      justify-content: center;
    }

    .users-modal-overlay.active {
      display: flex;
    }

    .users-modal {
      width: 100%;
      max-width: 600px;
      height: 92vh;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 16px 16px 0 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .users-modal-header {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .users-modal-header h3 {
      font-size: 15px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .users-modal-header h3 svg {
      width: 18px;
      height: 18px;
      color: var(--accent);
    }

    .close-modal-btn {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: var(--danger);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .close-modal-btn:active {
      background: var(--danger);
      color: white;
    }

    .search-filter-bar {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 8px;
      background: rgba(0, 0, 0, 0.15);
    }

    .search-box {
      flex: 1;
      position: relative;
    }

    .search-box input {
      width: 100%;
      padding: 8px 10px 8px 32px;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--fg);
      font-size: 12px;
    }

    .search-box input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .search-box svg {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      width: 14px;
      height: 14px;
      color: var(--muted);
    }

    .filter-select {
      padding: 8px 10px;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--fg);
      font-size: 12px;
      cursor: pointer;
    }

    .users-modal-body {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 10px;
    }

    .users-grid {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .user-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
    }

    .user-card.expired {
      border-color: var(--danger);
    }

    .user-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      gap: 8px;
    }

    .user-id {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--accent);
      background: rgba(6, 214, 160, 0.1);
      padding: 3px 8px;
      border-radius: 4px;
      cursor: pointer;
      word-break: break-all;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 8px;
      border-radius: 12px;
      font-size: 9px;
      font-weight: 600;
      text-transform: uppercase;
    }

    .status-badge.active {
      background: rgba(6, 214, 160, 0.15);
      color: var(--accent);
    }

    .status-badge.blocked {
      background: rgba(239, 68, 68, 0.15);
      color: var(--danger);
    }

    .plan-badge {
      display: inline-flex;
      padding: 3px 8px;
      border-radius: 4px;
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .plan-badge.daily {
      background: rgba(139, 92, 246, 0.15);
      color: #a78bfa;
      border: 1px solid rgba(139, 92, 246, 0.25);
    }

    .plan-badge.three-days {
      background: rgba(6, 214, 160, 0.15);
      color: var(--accent);
      border: 1px solid rgba(6, 214, 160, 0.25);
    }

    .plan-badge.seven-days {
      background: rgba(245, 158, 11, 0.15);
      color: var(--orange);
      border: 1px solid rgba(245, 158, 11, 0.25);
    }

    .plan-badge.custom {
      background: rgba(100, 116, 139, 0.15);
      color: var(--muted);
      border: 1px solid var(--border);
    }

    .user-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 8px;
    }

    .info-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
    }

    .info-row .label {
      color: var(--muted);
      min-width: 50px;
      font-size: 10px;
    }

    .info-row .value {
      font-family: 'JetBrains Mono', monospace;
      color: var(--fg);
      word-break: break-all;
      font-size: 11px;
    }

    .copy-btn {
      padding: 3px 6px;
      background: rgba(100, 116, 139, 0.1);
      border: none;
      border-radius: 4px;
      color: var(--muted);
      cursor: pointer;
    }

    .copy-btn:active {
      background: var(--accent);
      color: var(--bg);
    }

    .countdown-section {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid var(--border);
    }

    .countdown-label {
      font-size: 9px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.03em;
      margin-bottom: 6px;
    }

    .countdown-display {
      display: flex;
      gap: 6px;
    }

    .countdown-unit {
      background: rgba(0, 0, 0, 0.4);
      border-radius: 6px;
      padding: 6px 10px;
      text-align: center;
      min-width: 52px;
    }

    .countdown-unit .number {
      font-family: 'JetBrains Mono', monospace;
      font-size: 16px;
      font-weight: 700;
      color: var(--fg);
      line-height: 1;
    }

    .countdown-unit .text {
      font-size: 8px;
      color: var(--muted);
      text-transform: uppercase;
      margin-top: 2px;
    }

    .countdown-unit.danger .number {
      color: var(--danger);
    }

    .expired-badge {
      background: var(--danger);
      color: white;
      padding: 6px 10px;
      border-radius: 6px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
    }

    .user-actions {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
    }

    .empty-state svg {
      width: 48px;
      height: 48px;
      margin-bottom: 12px;
      opacity: 0.5;
    }

    .empty-state p {
      font-size: 14px;
    }

    .toast-container {
      position: fixed;
      top: 8px;
      right: 8px;
      left: 8px;
      z-index: 1001;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none;
    }

    .toast {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      pointer-events: auto;
    }

    .toast.success { border-color: var(--accent); }
    .toast.success svg { color: var(--accent); }
    .toast.error { border-color: var(--danger); }
    .toast.error svg { color: var(--danger); }

    .toast svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid transparent;
      border-top-color: currentColor;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (min-width: 640px) {
      .main-container { padding: 20px; }
      
      .users-modal {
        height: 85vh;
        max-width: 550px;
        border-radius: 12px;
        margin: auto;
      }
      
      .stats-grid {
        gap: 10px;
      }
      
      .stat-card {
        padding: 14px;
      }
      
      .stat-card .value {
        font-size: 24px;
      }
    }

    @media (min-width: 1024px) {
      .users-modal {
        max-width: 650px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>

<div class="bg-pattern"></div>

<div class="toast-container" id="toastContainer"></div>

<div class="main-container">
  
  <header class="header">
    <h1>License Manager</h1>
    <p>Device authentication control panel</p>
  </header>

  <div id="authSection">
    <div class="auth-card">
      <h2>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        Admin Login
      </h2>
      
      <div class="input-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="admin@example.com" autocomplete="email">
      </div>
      
      <div class="input-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password">
      </div>
      
      <button class="btn btn-primary" onclick="login()" id="loginBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
          <polyline points="10 17 15 12 10 7"/>
          <line x1="15" y1="12" x2="3" y2="12"/>
        </svg>
        Sign In
      </button>
    </div>
  </div>

  <div id="panel">
    
    <nav class="top-nav">
      <button class="nav-btn active" id="dashboardBtn" onclick="showDashboard()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7"/>
          <rect x="14" y="3" width="7" height="7"/>
          <rect x="14" y="14" width="7" height="7"/>
          <rect x="3" y="14" width="7" height="7"/>
        </svg>
        Dashboard
      </button>
      <button class="nav-btn" id="allUsersBtn" onclick="showAllUsers()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        All Users
      </button>
    </nav>

    <div id="dashboardContent">
      <div class="stats-grid" id="statsGrid">
        <div class="stat-card accent">
          <div class="label">Total</div>
          <div class="value" id="statTotal">0</div>
        </div>
        <div class="stat-card cyan">
          <div class="label">Today</div>
          <div class="value" id="statToday">0</div>
        </div>
        <div class="stat-card">
          <div class="label">Active</div>
          <div class="value" id="statActive">0</div>
        </div>
        <div class="stat-card danger">
          <div class="label">Expired</div>
          <div class="value" id="statExpired">0</div>
        </div>
        <div class="stat-card">
          <div class="label">Blocked</div>
          <div class="value" id="statBlocked">0</div>
        </div>
      </div>

      <div class="form-card">
        <h3>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="8.5" cy="7" r="4"/>
            <line x1="20" y1="8" x2="20" y2="14"/>
            <line x1="23" y1="11" x2="17" y2="11"/>
          </svg>
          <span id="formTitle">Add New User</span>
        </h3>
        
        <div class="form-grid">
          <div class="input-group">
            <label for="name">User Name</label>
            <input type="text" id="name" placeholder="John Doe" autocomplete="off">
          </div>
          
          <div class="input-group">
            <label for="deviceId">Device ID</label>
            <input type="text" id="deviceId" placeholder="DEVICE-XXXX" autocomplete="off">
          </div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBUBpTKI9wHNSi9_eCNbMrkGNKxbIIa9og",
  authDomain: "seven-v2-c13ea.firebaseapp.com",
  databaseURL: "https://seven-v2-c13ea-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "seven-v2-c13ea",
  storageBucket: "seven-v2-c13ea.firebasestorage.app",
  messagingSenderId: "363314674999",
  appId: "1:363314674999:web:1c5461978655ef481feeb2"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();

let usersData = {};
let countdownIntervals = {};
let currentTimePreset = null;
let expiryCheckerInterval = null;

function showToast(message, type) {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = 'toast ' + type;
  
  const icon = type === 'success' 
    ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>'
    : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>';
  
  toast.innerHTML = icon + '<span>' + message + '</span>';
  container.appendChild(toast);
  
  setTimeout(function() {
    toast.style.opacity = '0';
    setTimeout(function() { toast.remove(); }, 200);
  }, 3000);
}

function setTimePreset(preset) {
  const expiryInput = document.getElementById('expiry');
  const now = new Date();
  let targetDate;
  
  document.querySelectorAll('.preset-btn').forEach(function(btn) {
    btn.classList.remove('active');
  });
  
  const activeBtn = document.querySelector('.preset-btn.' + preset);
  if (activeBtn) activeBtn.classList.add('active');
  
  if (preset === 'daily') {
    targetDate = new Date(now.getTime() + 24 * 60 * 60 * 1000);
    currentTimePreset = 'daily';
  } else if (preset === 'three-days') {
    targetDate = new Date(now.getTime() + 3 * 24 * 60 * 60 * 1000);
    currentTimePreset = 'three-days';
  } else if (preset === 'seven-days') {
    targetDate = new Date(now.getTime() + 7 * 24 * 60 * 60 * 1000);
    currentTimePreset = 'seven-days';
  } else {
    currentTimePreset = 'custom';
    expiryInput.value = '';
    expiryInput.focus();
    return;
  }
  
  const year = targetDate.getFullYear();
  const month = String(targetDate.getMonth() + 1).padStart(2, '0');
  const day = String(targetDate.getDate()).padStart(2, '0');
  const hours = String(targetDate.getHours()).padStart(2, '0');
  const minutes = String(targetDate.getMinutes()).padStart(2, '0');
  
  expiryInput.value = year + '-' + month + '-' + day + 'T' + hours + ':' + minutes;
  showToast(preset + ' plan set', 'success');
}

auth.onAuthStateChanged(function(user) {
  if (user) {
    document.getElementById('authSection').style.display = 'none';
    document.getElementById('panel').classList.add('panel-active');
    loadUsers();
    startExpiryChecker();
  } else {
    document.getElementById('authSection').style.display = 'block';
    document.getElementById('panel').classList.remove('panel-active');
    clearAllIntervals();
  }
});

function login() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('loginBtn');
  
  if (!email || !password) {
    showToast('Please fill all fields', 'error');
    return;
  }
  
  btn.innerHTML = '<span class="spinner"></span> Signing in...';
  btn.disabled = true;
  
  auth.signInWithEmailAndPassword(email, password)
    .then(function() {
      showToast('Login successful!', 'success');
    })
    .catch(function(error) {
      showToast(error.message, 'error');
    })
    .finally(function() {
      btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg> Sign In';
      btn.disabled = false;
    });
}

function logout() {
  auth.signOut();
  showToast('Logged out', 'success');
}

function showDashboard() {
  document.getElementById('dashboardBtn').classList.add('active');
  document.getElementById('allUsersBtn').classList.remove('active');
  document.getElementById('dashboardContent').style.display = 'block';
  document.getElementById('usersModalOverlay').classList.remove('active');
}

function showAllUsers() {
  document.getElementById('dashboardBtn').classList.remove('active');
  document.getElementById('allUsersBtn').classList.add('active');
  document.getElementById('usersModalOverlay').classList.add('active');
  renderUsers();
}

function closeUsersModal(event) {
  if (event && event.target !== event.currentTarget) return;
  document.getElementById('usersModalOverlay').classList.remove('active');
  document.getElementById('dashboardBtn').classList.add('active');
  document.getElementById('allUsersBtn').classList.remove('active');
}

function saveUser() {
  const device = document.getElementById('deviceId').value.trim();
  const name = document.getElementById('name').value.trim();
  const key = document.getElementById('key').value.trim();
  const expiry = document.getElementById('expiry').value;
  const status = document.getElementById('status').value;
  const btn = document.getElementById('saveBtn');
  
  if (!device || !key) {
    showToast('Device ID and Key required', 'error');
    return;
  }
  
  btn.innerHTML = '<span class="spinner"></span> Saving...';
  btn.disabled = true;
  
  db.ref("licenses/" + device).set({
    name: name,
    key: key,
    expiry: expiry,
    status: status,
    plan: currentTimePreset || 'custom',
    createdAt: new Date().toISOString()
  })
  .then(function() {
    showToast('User saved!', 'success');
    resetForm();
  })
  .catch(function(error) {
    showToast(error.message, 'error');
  })
  .finally(function() {
    btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg> Save User';
    btn.disabled = false;
  });
}

function resetForm() {
  document.getElementById('deviceId').value = '';
  document.getElementById('name').value = '';
  document.getElementById('key').value = '';
  document.getElementById('expiry').value = '';
  document.getElementById('status').value = 'active';
  document.getElementById('formTitle').textContent = 'Add New User';
  currentTimePreset = null;
  document.querySelectorAll('.preset-btn').forEach(function(btn) {
    btn.classList.remove('active');
  });
}

function loadUsers() {
  db.ref("licenses").on("value", function(snapshot) {
    usersData = snapshot.val() || {};
    updateStats();
    if (document.getElementById('usersModalOverlay').classList.contains('active')) {
      renderUsers();
    }
  });
}

function filterUsers() {
  renderUsers();
}

function copyToClipboard(text) {
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(function() {
      showToast('Copied!', 'success');
    });
  } else {
    const textarea = document.createElement('textarea');
    textarea.value = text;
    document.body.appendChild(textarea);
    textarea.select();
    document.execCommand('copy');
    document.body.removeChild(textarea);
    showToast('Copied!', 'success');
  }
}

function getPlanDisplayName(plan) {
  if (plan === 'daily') return 'Daily';
  if (plan === 'three-days') return '3 Days';
  if (plan === 'seven-days') return '7 Days';
  return 'Custom';
}

function renderUsers() {
  const list = document.getElementById('userList');
  clearAllIntervals();
  
  const searchQuery = document.getElementById('searchInput').value.toLowerCase();
  const filterStatus = document.getElementById('filterStatus').value;
  
  let filteredUsers = {};
  const now = new Date();
  
  for (let id in usersData) {
    const user = usersData[id];
    const isExpired = user.expiry && now > new Date(user.expiry);
    
    const matchesSearch = 
      id.toLowerCase().includes(searchQuery) ||
      (user.name && user.name.toLowerCase().includes(searchQuery)) ||
      (user.key && user.key.toLowerCase().includes(searchQuery));
    
    let matchesStatus = true;
    if (filterStatus === 'active') matchesStatus = user.status === 'active' && !isExpired;
    else if (filterStatus === 'blocked') matchesStatus = user.status === 'blocked';
    else if (filterStatus === 'expired') matchesStatus = isExpired;
    
    if (matchesSearch && matchesStatus) {
      filteredUsers[id] = user;
    }
  }
  
  if (Object.keys(filteredUsers).length === 0) {
    list.innerHTML = '<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="17" y1="11" x2="23" y2="11"/></svg><p>No users found</p></div>';
    return;
  }
  
  let html = '';
  
  for (let id in filteredUsers) {
    const user = filteredUsers[id];
    const expiryDate = user.expiry ? new Date(user.expiry) : null;
    const isExpired = expiryDate && now > expiryDate;
    const plan = user.plan || 'custom';
    const safeId = id.replace(/[^a-zA-Z0-9]/g, '_');
    
    html += '<div class="user-card' + (isExpired ? ' expired' : '') + '">';
    html += '<div class="user-header">';
    html += '<span class="user-id" onclick="copyToClipboard(\'' + id + '\')">' + id + '</span>';
    html += '<div style="display:flex;gap:6px;align-items:center;">';
    html += '<span class="plan-badge ' + plan + '">' + getPlanDisplayName(plan) + '</span>';
    html += '<span class="status-badge ' + (user.status === 'active' ? 'active' : 'blocked') + '">' + user.status + '</span>';
    html += '</div></div>';
    
    html += '<div class="user-info">';
    html += '<div class="info-row"><span class="label">Name</span><span class="value">' + (user.name || 'N/A') + '</span></div>';
    html += '<div class="info-row"><span class="label">Key</span><span class="value">' + user.key + '</span>';
    html += '<button class="copy-btn" onclick="copyToClipboard(\'' + user.key + '\')"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button></div>';
    html += '<div class="info-row"><span class="label">Expiry</span><span class="value">' + (user.expiry ? formatDateTime(user.expiry) : 'No limit') + '</span></div>';
    html += '</div>';
    
    html += '<div class="countdown-section" id="countdown-' + safeId + '">' + renderCountdown(id, user) + '</div>';
    
    html += '<div class="user-actions">';
    html += '<button class="btn btn-secondary btn-sm" onclick="editUser(\'' + id + '\')"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg> Edit</button>';
    html += '<button class="btn btn-danger btn-sm" onclick="deleteUser(\'' + id + '\')"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg> Delete</button>';
    html += '</div></div>';
  }
  
  list.innerHTML = html;
  
  for (let id in filteredUsers) {
    const user = filteredUsers[id];
    if (user.expiry && !(now > new Date(user.expiry))) {
      startCountdown(id, user);
    }
  }
}

function renderCountdown(id, user) {
  if (!user.expiry) {
    return '<div class="countdown-label">No expiry set</div>';
  }
  
  const expiryDate = new Date(user.expiry);
  const now = new Date();
  const diff = expiryDate - now;
  
  if (diff <= 0) {
    return '<div class="expired-badge"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg> License Expired</div>';
  }
  
  const days = Math.floor(diff / (1000 * 60 * 60 * 24));
  const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
  const seconds = Math.floor((diff % (1000 * 60)) / 1000);
  const isUrgent = days === 0;
  
  return '<div class="countdown-label">Time Remaining</div>' +
    '<div class="countdown-display">' +
    '<div class="countdown-unit' + (isUrgent ? ' danger' : '') + '"><div class="number">' + String(days).padStart(2, '0') + '</div><div class="text">Days</div></div>' +
    '<div class="countdown-unit' + (isUrgent ? ' danger' : '') + '"><div class="number">' + String(hours).padStart(2, '0') + '</div><div class="text">Hrs</div></div>' +
    '<div class="countdown-unit' + (isUrgent ? ' danger' : '') + '"><div class="number">' + String(minutes).padStart(2, '0') + '</div><div class="text">Min</div></div>' +
    '<div class="countdown-unit' + (isUrgent ? ' danger' : '') + '"><div class="number">' + String(seconds).padStart(2, '0') + '</div><div class="text">Sec</div></div>' +
    '</div>';
}

function startCountdown(id, user) {
  if (!user.expiry) return;
  
  const safeId = id.replace(/[^a-zA-Z0-9]/g, '_');
  
  const interval = setInterval(function() {
    const expiryDate = new Date(user.expiry);
    const now = new Date();
    const diff = expiryDate - now;
    
    const container = document.getElementById('countdown-' + safeId);
    if (!container || diff <= 0) {
      clearInterval(interval);
      delete countdownIntervals[safeId];
      if (container && diff <= 0) {
        container.innerHTML = '<div class="expired-badge"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg> License Expired</div>';
      }
      return;
    }
    
    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((diff % (1000 * 60)) / 1000);
    const isUrgent = days === 0;
    
    container.innerHTML = '<div class="countdown-label">Time Remaining</div>' +
      '<div class="countdown-display">' +
      '<div class="countdown-unit' + (isUrgent ? ' danger' : '') + '"><div class="number">' + String(days).padStart(2, '0') + '</div><div class="text">Days</div></div>' +
      '<div class="countdown-unit' + (isUrgent ? ' danger' : '') + '"><div class="number">' + String(hours).padStart(2, '0') + '</div><div class="text">Hrs</div></div>' +
      '<div class="countdown-unit' + (isUrgent ? ' danger' : '') + '"><div class="number">' + String(minutes).padStart(2, '0') + '</div><div class="text">Min</div></div>' +
      '<div class="countdown-unit' + (isUrgent ? ' danger' : '') + '"><div class="number">' + String(seconds).padStart(2, '0') + '</div><div class="text">Sec</div></div>' +
      '</div>';
  }, 1000);
  
  countdownIntervals[safeId] = interval;
}

function clearAllIntervals() {
  for (let key in countdownIntervals) {
    clearInterval(countdownIntervals[key]);
  }
  countdownIntervals = {};
  if (expiryCheckerInterval) {
    clearInterval(expiryCheckerInterval);
    expiryCheckerInterval = null;
  }
}

function startExpiryChecker() {
  expiryCheckerInterval = setInterval(function() {
    const now = new Date();
    for (let id in usersData) {
      const user = usersData[id];
      if (user.expiry && now > new Date(user.expiry)) {
        db.ref("licenses/" + id).remove();
      }
    }
  }, 10000);
}

function updateStats() {
  const total = Object.keys(usersData).length;
  let active = 0;
  let expired = 0;
  let blocked = 0;
  let addedToday = 0;
  
  const now = new Date();
  const startOfToday = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  
  for (let id in usersData) {
    const user = usersData[id];
    
    if (user.status === 'blocked') {
      blocked++;
    } else {
      if (user.expiry && now > new Date(user.expiry)) {
        expired++;
      } else {
        active++;
      }
    }
    
    if (user.createdAt && new Date(user.createdAt) >= startOfToday) {
      addedToday++;
    }
  }
  
  document.getElementById('statTotal').textContent = total;
  document.getElementById('statActive').textContent = active;
  document.getElementById('statExpired').textContent = expired;
  document.getElementById('statBlocked').textContent = blocked;
  document.getElementById('statToday').textContent = addedToday;
}

function editUser(id) {
  const user = usersData[id];
  if (!user) return;
  
  closeUsersModal();
  
  document.getElementById('deviceId').value = id;
  document.getElementById('name').value = user.name || '';
  document.getElementById('key').value = user.key || '';
  document.getElementById('expiry').value = user.expiry || '';
  document.getElementById('status').value = user.status || 'active';
  document.getElementById('formTitle').textContent = 'Edit: ' + id;
  
  currentTimePreset = user.plan || 'custom';
  
  document.querySelectorAll('.preset-btn').forEach(function(btn) {
    btn.classList.remove('active');
  });
  
  if (currentTimePreset !== 'custom') {
    const activeBtn = document.querySelector('.preset-btn.' + currentTimePreset);
    if (activeBtn) activeBtn.classList.add('active');
  }
  
  window.scrollTo({ top: 0, behavior: 'smooth' });
  showToast('Editing: ' + id, 'success');
}

function deleteUser(id) {
  if (!confirm('Delete user: ' + id + '?')) return;
  
  db.ref("licenses/" + id).remove()
    .then(function() {
      showToast('Deleted: ' + id, 'success');
    })
    .catch(function(error) {
      showToast(error.message, 'error');
    });
}

function formatDateTime(dateStr) {
  const date = new Date(dateStr);
  return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) + 
    ' ' + date.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
}

document.getElementById('password').addEventListener('keypress', function(e) {
  if (e.key === 'Enter') login();
});

document.getElementById('email').addEventListener('keypress', function(e) {
  if (e.key === 'Enter') document.getElementById('password').focus();
});

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeUsersModal();
